name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag name to publish a GitHub Release, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      release_id: ${{ steps.github-release.outputs.release_id }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          manual_tag="${{ inputs.release_tag }}"
          tag=""

          if [ -n "$manual_tag" ]; then
            tag="$manual_tag"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
          fi

          publish="false"
          version=""
          if [ -n "$tag" ]; then
            publish="true"
            version="${tag#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag '$tag' must look like v1.2.3 or v1.2.3-beta.1." >&2
              exit 1
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create or find GitHub Release
        id: github-release
        if: steps.release.outputs.publish == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.release.outputs.tag }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let release;

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = existing.data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (!release) {
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body: 'See the assets below to download and install this version.',
                draft: false,
                prerelease: false,
                generate_release_notes: true,
              });
              release = created.data;
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.id,
              per_page: 100,
            });

            for (const asset of assets) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id,
              });
            }

            core.setOutput('release_id', String(release.id));

  build-desktop:
    name: Build ${{ matrix.label }} installer
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            artifact_name: codex-config-manager-windows
            rust_targets: ""
            build_args: --bundles nsis
            bundle_paths: |
              src-tauri/target/release/bundle/nsis/*
              src-tauri/target/release/bundle/msi/*
          - label: macOS universal
            os: macos-latest
            artifact_name: codex-config-manager-macos-universal
            rust_targets: x86_64-apple-darwin aarch64-apple-darwin
            build_args: --target universal-apple-darwin --bundles dmg
            bundle_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure optional Apple signing credentials
        if: matrix.label == 'macOS universal'
        shell: bash
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${APPLE_CERTIFICATE_SECRET:-}" ]; then
            echo "Apple signing certificate is not configured; using the ad-hoc signing identity from tauri.conf.json."
            exit 0
          fi

          append_env() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              return
            fi
            local delimiter="CODEX_HELPER_$(uuidgen)"
            {
              echo "${name}<<${delimiter}"
              echo "$value"
              echo "$delimiter"
            } >> "$GITHUB_ENV"
          }

          append_env APPLE_CERTIFICATE "$APPLE_CERTIFICATE_SECRET"
          append_env APPLE_CERTIFICATE_PASSWORD "$APPLE_CERTIFICATE_PASSWORD_SECRET"
          append_env APPLE_SIGNING_IDENTITY "$APPLE_SIGNING_IDENTITY_SECRET"
          append_env APPLE_ID "$APPLE_ID_SECRET"
          append_env APPLE_PASSWORD "$APPLE_PASSWORD_SECRET"
          append_env APPLE_TEAM_ID "$APPLE_TEAM_ID_SECRET"

      - name: Apply release version
        if: needs.prepare-release.outputs.publish == 'true'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare-release.outputs.version }}"

          $packageJsonPath = "package.json"
          $packageJson = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
          $packageJson.version = $version
          $packageJson | ConvertTo-Json -Depth 20 | Set-Content $packageJsonPath -Encoding UTF8

          $tauriConfigPath = "src-tauri/tauri.conf.json"
          $tauriConfig = Get-Content $tauriConfigPath -Raw | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 20 | Set-Content $tauriConfigPath -Encoding UTF8

          $cargoTomlPath = "src-tauri/Cargo.toml"
          $cargoToml = Get-Content $cargoTomlPath -Raw
          $cargoToml = $cargoToml -replace '(?m)^version = "[^"]+"', "version = `"$version`""
          Set-Content $cargoTomlPath $cargoToml -Encoding UTF8

          Write-Host "Building release ${{ needs.prepare-release.outputs.tag }} as app version $version."

      - name: Build and publish Tauri app
        if: needs.prepare-release.outputs.publish == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_HELPER_VERSION: ${{ needs.prepare-release.outputs.tag }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          args: ${{ matrix.build_args }}
          retryAttempts: 2

      - name: Build Tauri app
        if: needs.prepare-release.outputs.publish != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.build_args }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_paths }}
          if-no-files-found: warn
