name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag name to publish a GitHub Release, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $manualTag = "${{ inputs.release_tag }}"
          $releaseTag = "${{ github.event.release.tag_name }}"
          $tag = ""
          if (-not [string]::IsNullOrWhiteSpace($manualTag)) {
            $tag = $manualTag
          } elseif (-not [string]::IsNullOrWhiteSpace($releaseTag)) {
            $tag = $releaseTag
          } elseif ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $tag = "${{ github.ref_name }}"
          }

          $publish = "false"
          if (-not [string]::IsNullOrWhiteSpace($tag)) {
            $publish = "true"
          }

          $version = ""
          if ($publish -eq "true") {
            $version = $tag -replace "^v", ""
            if ($version -notmatch "^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$") {
              throw "Release tag '$tag' must look like v1.2.3 or v1.2.3-beta.1."
            }
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "publish=$publish" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Apply release version
        if: steps.release.outputs.publish == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"

          $packageJsonPath = "package.json"
          $packageJson = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
          $packageJson.version = $version
          $packageJson | ConvertTo-Json -Depth 20 | Set-Content $packageJsonPath -Encoding UTF8

          $tauriConfigPath = "src-tauri/tauri.conf.json"
          $tauriConfig = Get-Content $tauriConfigPath -Raw | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 20 | Set-Content $tauriConfigPath -Encoding UTF8

          $cargoTomlPath = "src-tauri/Cargo.toml"
          $cargoToml = Get-Content $cargoTomlPath -Raw
          $cargoToml = $cargoToml -replace '(?m)^version = "[^"]+"', "version = `"$version`""
          Set-Content $cargoTomlPath $cargoToml -Encoding UTF8

          Write-Host "Building release ${{ steps.release.outputs.tag }} as app version $version."

      - name: Build and publish Tauri app
        if: steps.release.outputs.publish == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2

      - name: Build Tauri app
        if: steps.release.outputs.publish != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-config-manager-windows
          path: |
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/msi/*
          if-no-files-found: warn
